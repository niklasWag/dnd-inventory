<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
    <style>
        :root { --fg: #111111; --fg-dim: rgba(17,17,17,0.5); }
        @media (prefers-color-scheme: dark) {
            :root { --fg: #ffffff; --fg-dim: rgba(255,255,255,0.5); }
        }
    </style>
    <polygon
        points="16,2 28,11 4,11"
        fill="none"
        stroke="var(--fg)"
        stroke-width="1.5"
        stroke-linejoin="round"
    />
    <polygon
        points="4,11 28,11 23,28 9,28"
        fill="none"
        stroke="var(--fg)"
        stroke-width="1.5"
        stroke-linejoin="round"
    />
    <line x1="16" y1="2" x2="9" y2="28" stroke="var(--fg-dim)" stroke-width="1" />
    <line x1="16" y1="2" x2="23" y2="28" stroke="var(--fg-dim)" stroke-width="1" />
    <line x1="4" y1="11" x2="28" y2="11" stroke="var(--fg-dim)" stroke-width="1" />

    <text
        x="16"
        y="23"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="8"
        fill="var(--fg)"
    >20</text>
</svg>
