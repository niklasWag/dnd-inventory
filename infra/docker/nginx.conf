# R8.2 — nginx config for the `apps/web` static bundle.
#
# One-server SPA-mode setup:
#   - listen on :80 (docker-compose maps the host port to this)
#   - serve everything from /usr/share/nginx/html (the vite `dist/`)
#   - fall back to /index.html for any path that doesn't match a real
#     file, so React Router can handle client-side routes like
#     /party/:partyId/* on direct navigation / hard refresh
#   - cache immutable hashed assets aggressively; never cache index.html
#     (the entry point references the current asset hashes)
#   - gzip on the fly for text-ish payloads. vite pre-compresses to .gz
#     already, but browsers that don't send `Accept-Encoding: br` get
#     served the plain file — gzip catches those.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip compression for common text types. Compression ratio for
    # already-minified JS is small (~30%) but non-zero, and this is
    # cheap on a small SPA.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    # Long-lived cache for hashed asset bundles (Vite emits
    # `assets/index-<hash>.{js,css}` with content-based hashes; a new
    # deploy changes the hash → new URL → browser refetches).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML. Every deploy replaces its inlined
    # asset URLs; caching it would strand clients on a stale bundle
    # after the assets themselves are cached long-term.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: any non-file path serves index.html. This is what
    # lets a hard refresh on /party/xyz/inventory work — nginx sends
    # the bundle, React Router does the rest.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
