# Dependabot config — weekly pnpm + Actions updates.
# Grouping keeps the PR count manageable for a small repo.
version: 2

updates:
  # pnpm monorepo — a single manifest scan at the root picks up all workspaces
  # via the `packages/*` + `apps/*` glob in pnpm-workspace.yaml.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - deps:npm
    commit-message:
      prefix: '⬆️'
      include: scope
    groups:
      react:
        patterns:
          - 'react'
          - 'react-*'
          - '@types/react*'
      radix-shadcn:
        patterns:
          - '@radix-ui/*'
          - 'shadcn-ui'
          - 'class-variance-authority'
          - 'clsx'
          - 'tailwind*'
          - '@tailwindcss/*'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      fastify:
        patterns:
          - 'fastify'
          - '@fastify/*'
      auth:
        patterns:
          - '@auth/*'
          - 'next-auth'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
      lint-format:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@typescript-eslint/*'
          - 'prettier'
          - 'prettier-*'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/react*'
    # Block noisy major bumps until we opt into them as their own slice.
    #   - tailwindcss 3→4 is a rewrite (new engine, CSS-based config, browser drops).
    #   - tailwind-merge v3 exists to match Tailwind 4's utility set — bump together.
    #   - eslint 9→10 changes rule surface + Node engines; needs a config review.
    #   - @types/node must match the Node runtime major (currently 22 in Dockerfile).
    #   - react-router-dom majors have caused breaking API changes historically.
    #   - prisma majors touch DB engine + generated client shape.
    ignore:
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: 'tailwind-merge'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-router-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-router'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/*'
        update-types: ['version-update:semver-major']

  # GitHub Actions — none in the repo yet, but pre-configuring so any future
  # workflow is auto-tracked without a config edit.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - deps:actions
    commit-message:
      prefix: '⬆️ ci'

  # Docker base images.
  - package-ecosystem: docker
    directory: '/infra/docker'
    schedule:
      interval: monthly
      day: monday
      time: '06:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - deps:docker
    commit-message:
      prefix: '⬆️ docker'
    # Pin the Node major to the current LTS. Bumping the Docker base
    # image major means also bumping engines + @types/node — do it as
    # a deliberate slice, not a Dependabot Monday.
    ignore:
      - dependency-name: 'node'
        update-types: ['version-update:semver-major']
